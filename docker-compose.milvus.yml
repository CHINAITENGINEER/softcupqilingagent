services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: safeops-milvus-etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    volumes:
      - safeops_milvus_etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - safeops-milvus

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: safeops-milvus-minio
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - safeops_milvus_minio:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - safeops-milvus

  milvus:
    image: milvusdb/milvus:v2.4.13
    container_name: safeops-milvus-standalone
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - safeops_milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - safeops-milvus

networks:
  safeops-milvus:
    name: safeops-milvus

volumes:
  safeops_milvus_etcd:
  safeops_milvus_minio:
  safeops_milvus_data:
