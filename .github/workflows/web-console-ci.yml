name: Web Console CI

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-console-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-console-ci.yml"

permissions:
  contents: read

concurrency:
  group: web-console-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Typecheck
        working-directory: web
        run: npm run typecheck

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Build
        working-directory: web
        run: npm run build
