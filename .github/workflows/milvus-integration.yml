name: Milvus RAG integration

on:
  workflow_dispatch:
  schedule:
    - cron: "30 18 * * 6"

permissions:
  contents: read

concurrency:
  group: milvus-rag-integration
  cancel-in-progress: false

jobs:
  real-milvus:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SAFEOPS_RAG_MILVUS_URI: http://localhost:19530
      SAFEOPS_RAG_MILVUS_TOKEN: ${{ secrets.SAFEOPS_RAG_MILVUS_TOKEN }}
      SAFEOPS_RAG_MILVUS_IT: "true"
      SAFEOPS_RAG_MILVUS_IVF_FLAT_IT: "true"
      SAFEOPS_RAG_MILVUS_KEEP_COLLECTION: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Start Milvus standalone
        run: |
          docker network create milvus-ci
          docker run -d --name milvus-etcd --network milvus-ci \
            -e ETCD_AUTO_COMPACTION_MODE=revision \
            -e ETCD_AUTO_COMPACTION_RETENTION=1000 \
            quay.io/coreos/etcd:v3.5.5 \
            etcd --advertise-client-urls=http://milvus-etcd:2379 --listen-client-urls=http://0.0.0.0:2379
          docker run -d --name milvus-minio --network milvus-ci \
            -e MINIO_ACCESS_KEY=minioadmin \
            -e MINIO_SECRET_KEY=minioadmin \
            minio/minio:RELEASE.2023-03-20T20-16-18Z \
            minio server /minio_data
          docker run -d --name milvus-standalone --network milvus-ci \
            -p 19530:19530 -p 9091:9091 \
            -e ETCD_ENDPOINTS=milvus-etcd:2379 \
            -e MINIO_ADDRESS=milvus-minio:9000 \
            milvusdb/milvus:v2.4.13 \
            milvus run standalone

      - name: Wait for Milvus
        shell: bash
        run: |
          for attempt in {1..90}; do
            if curl --fail --silent http://localhost:9091/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs milvus-standalone
          exit 1

      - name: Run HNSW and IVF_FLAT integration tests
        run: mvn -B -Dtest=RagMilvusKnowledgeIntegrationTest,RagMilvusIvfFlatKnowledgeIntegrationTest test

      - name: Capture Milvus logs on failure
        if: failure()
        run: docker logs milvus-standalone
