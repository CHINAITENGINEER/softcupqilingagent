services:
  backend:
    build: .
    environment:
      SERVER_PORT: 8088
      SAFEOPS_LLM_API_KEY: ${SAFEOPS_LLM_API_KEY:-}
      SAFEOPS_RAG_EMBEDDING_API_KEY: ${SAFEOPS_RAG_EMBEDDING_API_KEY:-}
    ports: ["8088:8088"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8088/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
  web:
    build: ./web
    ports: ["8080:8080"]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 6
