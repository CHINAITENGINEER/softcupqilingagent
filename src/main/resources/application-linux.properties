server.port=${SAFEOPS_SERVER_PORT:8088}

spring.datasource.url=${SAFEOPS_H2_URL:jdbc:h2:file:./data/safeops;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;AUTO_SERVER=TRUE}
spring.datasource.username=${SAFEOPS_H2_USER:sa}
spring.datasource.password=${SAFEOPS_H2_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
