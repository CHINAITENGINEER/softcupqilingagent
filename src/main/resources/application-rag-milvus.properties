ops-agent.rag.enabled=true
ops-agent.rag.retriever-mode=vector
ops-agent.rag.embedding-provider=openai
ops-agent.rag.embedding-base-url=${SAFEOPS_RAG_EMBEDDING_BASE_URL:http://localhost:11434/v1}
ops-agent.rag.embedding-api-key=${SAFEOPS_RAG_EMBEDDING_API_KEY:}
ops-agent.rag.embedding-model=${SAFEOPS_RAG_EMBEDDING_MODEL:text-embedding-3-small}
ops-agent.rag.vector-store-provider=milvus
ops-agent.rag.milvus-uri=${SAFEOPS_RAG_MILVUS_URI:http://localhost:19530}
ops-agent.rag.milvus-token=${SAFEOPS_RAG_MILVUS_TOKEN:}
ops-agent.rag.milvus-collection=${SAFEOPS_RAG_MILVUS_COLLECTION:safeops_knowledge}
ops-agent.rag.milvus-dimension=${SAFEOPS_RAG_MILVUS_DIMENSION:1536}
ops-agent.rag.milvus-metric-type=${SAFEOPS_RAG_MILVUS_METRIC_TYPE:cosine}
ops-agent.rag.milvus-index-type=${SAFEOPS_RAG_MILVUS_INDEX_TYPE:autoindex}
ops-agent.rag.milvus-hnsw-m=${SAFEOPS_RAG_MILVUS_HNSW_M:16}
ops-agent.rag.milvus-hnsw-ef-construction=${SAFEOPS_RAG_MILVUS_HNSW_EF_CONSTRUCTION:200}
ops-agent.rag.milvus-hnsw-ef=${SAFEOPS_RAG_MILVUS_HNSW_EF:64}
ops-agent.rag.milvus-ivf-flat-nlist=${SAFEOPS_RAG_MILVUS_IVF_FLAT_NLIST:128}
ops-agent.rag.milvus-ivf-flat-nprobe=${SAFEOPS_RAG_MILVUS_IVF_FLAT_NPROBE:16}
ops-agent.rag.milvus-validate-index=${SAFEOPS_RAG_MILVUS_VALIDATE_INDEX:false}
ops-agent.rag.milvus-auto-create-collection=${SAFEOPS_RAG_MILVUS_AUTO_CREATE_COLLECTION:false}
ops-agent.rag.milvus-auto-load-collection=${SAFEOPS_RAG_MILVUS_AUTO_LOAD_COLLECTION:true}
ops-agent.rag.max-results=${SAFEOPS_RAG_MAX_RESULTS:5}
ops-agent.rag.context-max-length=${SAFEOPS_RAG_CONTEXT_MAX_LENGTH:2000}
ops-agent.rag.snippet-max-length=${SAFEOPS_RAG_SNIPPET_MAX_LENGTH:500}
