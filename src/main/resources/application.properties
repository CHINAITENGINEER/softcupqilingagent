spring.application.name=qilingos-safeops-agent
server.port=8088

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

ops-agent.execution.default-timeout-ms=5000
ops-agent.execution.output-limit-bytes=20000
ops-agent.audit.in-memory-max-traces=500
ops-agent.planner.mode=rule
ops-agent.llm.provider=fake
ops-agent.llm.base-url=
ops-agent.llm.api-key=${SAFEOPS_LLM_API_KEY:}
ops-agent.llm.model=
ops-agent.llm.connect-timeout-ms=15000
ops-agent.llm.read-timeout-ms=15000
ops-agent.llm.temperature=0
ops-agent.llm.max-output-tokens=1000
ops-agent.llm.audit-raw-response=false
ops-agent.llm.response-format-json-object=true
ops-agent.rag.enabled=false
ops-agent.rag.retriever-mode=keyword
ops-agent.rag.embedding-provider=deterministic
ops-agent.rag.embedding-base-url=
ops-agent.rag.embedding-api-key=${SAFEOPS_RAG_EMBEDDING_API_KEY:}
ops-agent.rag.embedding-model=
ops-agent.rag.vector-store-provider=in-memory
ops-agent.rag.milvus-uri=
ops-agent.rag.milvus-token=${SAFEOPS_RAG_MILVUS_TOKEN:}
ops-agent.rag.milvus-collection=
ops-agent.rag.milvus-dimension=0
ops-agent.rag.milvus-metric-type=cosine
ops-agent.rag.milvus-index-type=autoindex
ops-agent.rag.milvus-hnsw-m=16
ops-agent.rag.milvus-hnsw-ef-construction=200
ops-agent.rag.milvus-hnsw-ef=64
ops-agent.rag.milvus-ivf-flat-nlist=128
ops-agent.rag.milvus-ivf-flat-nprobe=16
ops-agent.rag.milvus-validate-index=false
ops-agent.rag.milvus-auto-create-collection=false
ops-agent.rag.milvus-auto-load-collection=true
ops-agent.rag.max-results=5
ops-agent.rag.context-max-length=2000
ops-agent.rag.snippet-max-length=500

spring.datasource.url=jdbc:h2:mem:safeops;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
